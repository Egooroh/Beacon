name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: build · lint · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beacon
          POSTGRES_PASSWORD: beacon
          POSTGRES_DB: beacon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: Test
        env:
          BEACON_DB_DSN: postgres://beacon:beacon@localhost:5432/beacon?sslmode=disable
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/beacon
