run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gocritic
    - sloglint
    - goimports
    - gosimple
    - ineffassign
    - unused
    - noctx
    - bodyclose

linters-settings:
  errcheck:
    # blank-identifier assignments (e.g., _ = w.Write) are intentional; don't flag them.
    check-blank: false

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
      - name: unused-parameter
      - name: context-as-argument
        arguments:
          - "allowTypesBefore": "*testing.T"

  sloglint:
    no-mixed-args: true
    kv-only: true

  goimports:
    local-prefixes: github.com/Egooroh/beacon

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  exclude-rules:
    # Test files: relax some rules that don't add value in test context.
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - revive
